<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>直播答题</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="stage">

    <!-- 1. 头部区域：直播间名称 + 设置按钮入口 -->
    <header class="header">
      <div class="header-info">
        <div class="room-name" id="room-name">未配置直播间</div>
        <div class="conn-status" id="conn-status">
          <span class="dot" id="status-dot"></span>正在连接...
        </div>
      </div>
      <!-- 2. 设置按钮入口 -->
      <button class="btn-settings" id="btn-settings" title="设置">⚙</button>
    </header>

    <!-- 3. 题目展示区 -->
    <section class="question-area">
      <div class="q-meta" id="q-meta"></div>
      <div class="q-text" id="q-text">加载中...</div>
    </section>

    <!-- 4. ABCD 选项展示区 -->
    <section class="options" id="options"></section>

    <!-- 5. 倒计时展示区 -->
    <section class="countdown-area">
      <div class="timer-ring">
        <svg width="52" height="52">
          <circle cx="26" cy="26" r="22" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="4"/>
          <circle id="timer-circle" cx="26" cy="26" r="22" fill="none" stroke="#6366f1" stroke-width="4"
                  stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="0"/>
        </svg>
        <div class="num" id="timer-num">15</div>
      </div>
      <div class="hint" id="hint">点击 <b>开始答题</b>，观众在直播间发送 A/B/C/D 即可参与</div>
      <div class="ctrl-btns">
        <button class="ctrl-btn ghost" id="btn-prev">上一题</button>
        <button class="ctrl-btn" id="btn-start">开始答题</button>
        <button class="ctrl-btn ghost" id="btn-next">下一题</button>
      </div>
    </section>

    <!-- 统计条 -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- 6. 排行榜区域 -->
    <section class="leaderboard">
      <div class="lb-header">
        <span>🏆 实时排行榜</span>
        <button class="btn btn-ghost" id="btn-reset" style="padding:4px 10px;font-size:11px">重置</button>
      </div>
      <div class="lb-list" id="lb-list">
        <div class="lb-empty">暂无排行，开始答题后观众作答即可上榜</div>
      </div>
    </section>

  </div>

  <script src="./DouyinLiveWS.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
