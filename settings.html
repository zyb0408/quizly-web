<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>设置 - 直播答题</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body style="background:var(--bg-dark)">
  <div class="page">

    <div class="page-header">
      <button class="back-btn" onclick="location.href='./index.html'">‹</button>
      <h1>设置</h1>
    </div>

    <!-- 直播间配置 -->
    <div class="card">
      <h2>📡 直播间配置</h2>
      <div class="field">
        <label>直播间名称（用于头部展示）</label>
        <input type="text" id="cfg-room-name" placeholder="例如：知识答题直播间">
      </div>
      <div class="field">
        <label>直播间 ID</label>
        <input type="text" id="cfg-room-id" placeholder="例如：516466932480">
      </div>
      <div class="field">
        <label>Cookies（选填）</label>
        <textarea id="cfg-cookie" rows="3" placeholder="粘贴抖音 Cookie，可留空"></textarea>
      </div>
      <div class="row">
        <div class="field">
          <label>WebSocket 服务地址</label>
          <input type="text" id="cfg-host" placeholder="127.0.0.1">
        </div>
        <div class="field">
          <label>端口</label>
          <input type="number" id="cfg-port" placeholder="1088">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-save-config">保存配置</button>
        <button class="btn btn-ghost" id="btn-test-config">测试连接</button>
      </div>
    </div>

    <!-- 答题设置 -->
    <div class="card">
      <h2>🎮 答题设置</h2>

      <div class="switch-row">
        <div class="switch-label">
          <div class="title">答题模式</div>
          <div class="desc">手动：点击下一题切换；自动：倒计时结束自动下一题</div>
        </div>
        <div class="seg" id="seg-answer-mode">
          <button data-val="manual" class="active">手动</button>
          <button data-val="auto">自动</button>
        </div>
      </div>

      <div class="switch-row">
        <div class="switch-label">
          <div class="title">科目答题</div>
          <div class="desc">开启后仅答指定科目题目；关闭则全部题目随机作答</div>
        </div>
        <div class="switch" id="sw-subject-mode"></div>
      </div>

      <div class="field" id="subject-filter-wrap" style="display:none">
        <label>选择答题科目</label>
        <select id="cfg-subject-filter">
          <option value="">请选择科目</option>
        </select>
      </div>

      <div class="switch-row">
        <div class="switch-label">
          <div class="title">自动答题间隔</div>
          <div class="desc">自动模式下，每题倒计时秒数</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="cfg-countdown" value="15" min="3" max="120"
                 style="width:70px;padding:6px 8px;border-radius:8px;border:1px solid rgba(148,163,184,.2);background:#0f172a;color:var(--text)">
          <span style="font-size:12px;color:var(--text-dim)">秒</span>
        </div>
      </div>
    </div>

    <!-- 主题选择 -->
    <div class="card">
      <h2>🎨 主题风格</h2>
      <div class="theme-grid" id="theme-grid">
        <div class="theme-item" data-theme="purple">
          <div class="theme-swatch" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)"></div>
          <div class="name">深紫</div>
        </div>
        <div class="theme-item" data-theme="blue">
          <div class="theme-swatch" style="background:linear-gradient(135deg,#3b82f6,#06b6d4)"></div>
          <div class="name">深蓝</div>
        </div>
        <div class="theme-item" data-theme="orange">
          <div class="theme-swatch" style="background:linear-gradient(135deg,#f97316,#f59e0b)"></div>
          <div class="name">暖橙</div>
        </div>
        <div class="theme-item" data-theme="green">
          <div class="theme-swatch" style="background:linear-gradient(135deg,#10b981,#14b8a6)"></div>
          <div class="name">赛博绿</div>
        </div>
        <div class="theme-item" data-theme="rose">
          <div class="theme-swatch" style="background:linear-gradient(135deg,#ec4899,#f43f5e)"></div>
          <div class="name">玫红</div>
        </div>
      </div>
      <div class="help-text">选择后会实时预览，保存配置后生效</div>
    </div>

    <!-- 配置导入导出 -->
    <div class="card">
      <h2>💾 配置导入 / 导出</h2>
      <div class="help-text" style="margin-bottom:10px">
        导出当前所有设置（直播间配置、答题设置、主题，<b>不包含题目</b>）为 JSON 文件，方便备份或迁移。
      </div>
      <div class="config-actions">
        <button class="btn btn-primary" id="btn-export-config">导出配置</button>
        <button class="btn btn-accent" id="btn-import-config">导入配置</button>
        <input type="file" id="config-file-input" class="file-input" accept=".json">
      </div>
    </div>

    <!-- 题目管理 -->
    <div class="card">
      <h2>📚 题目管理</h2>

      <!-- 条件查询 -->
      <div class="filter-bar">
        <div class="field">
          <label>科目</label>
          <select id="filter-subject">
            <option value="">全部</option>
          </select>
        </div>
        <div class="field" style="min-width:160px;flex:1">
          <label>关键词</label>
          <input type="text" id="filter-keyword" placeholder="搜索题目/选项/序号">
        </div>
        <button class="btn btn-ghost" id="btn-query">查询</button>
      </div>

      <!-- 批量操作 -->
      <div class="btn-row" style="margin-bottom:12px">
        <button class="btn btn-accent" id="btn-import-csv">导入 CSV</button>
        <button class="btn btn-accent" id="btn-import-json">导入 JSON</button>
        <button class="btn btn-ghost" id="btn-export-csv">导出 CSV</button>
        <button class="btn btn-ghost" id="btn-export-json">导出 JSON</button>
        <button class="btn btn-danger" id="btn-delete-selected">删除选中</button>
        <button class="btn btn-danger" id="btn-delete-all">清空全部</button>
        <input type="file" id="file-input" class="file-input" accept=".csv,.json">
      </div>

      <div class="help-text">
        题目字段：科目、序号、题目、选项A、选项B、选项C、选项D、正确答案（A/B/C/D）
      </div>

      <!-- 题目表格 -->
      <div class="q-table-wrap" style="margin-top:12px;max-height:50vh;overflow:auto">
        <table class="q-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="check-all"></th>
              <th>科目</th>
              <th>序号</th>
              <th>题目</th>
              <th>A</th>
              <th>B</th>
              <th>C</th>
              <th>D</th>
              <th>答案</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="q-tbody"></tbody>
        </table>
      </div>
      <div id="q-count" class="help-text" style="margin-top:8px"></div>
    </div>

  </div>

  <script src="./js/storage.js"></script>
  <script src="./DouyinLiveWS.js"></script>
  <script src="./js/settings.js"></script>
</body>
</html>
